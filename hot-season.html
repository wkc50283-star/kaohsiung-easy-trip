    <section class="page-hero"><h1>高雄夏天怎麼玩？</h1><p class="page-lead">4～10 月把戶外排早上或傍晚，中午留給室內，會比硬走舒服。</p></section>
    <article class="info-card"><ul class="plain-list"><li>4～10 月為高雄熱季。</li><li>戶外景點不要排中午。</li><li>旗津、西子灣、駁二、大港橋、蓮池潭盡量排早上或傍晚。</li><li>中午安排室內、百貨、商圈、咖啡、展館。</li><li>準備防曬、水、帽子，並留意午後雷陣雨。</li><li>雨天時不要硬去海邊、渡輪、長時間戶外。</li></ul></article>
