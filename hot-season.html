<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>高雄夏天怎麼玩｜4到10月熱季行程、避暑與雨天備案</title><meta name="description" content="高雄4到10月白天偏熱，行程不適合硬排戶外。整理熱季不開車行程原則，包含中午避暑點、港邊傍晚玩法、旗津西子灣提醒與雨天備案。"><meta name="robots" content="index,follow"><link rel="canonical" href="https://wkc50283-star.github.io/kaohsiung-easy-trip/hot-season.html"><link rel="stylesheet" href="css/style.css"></head><body><header class="site-header"><a class="brand" href="index.html">一路玩高雄</a><nav class="top-nav"><a href="index.html">首頁</a><a href="stay.html">住宿區</a><a href="rainy-day.html">雨天備案</a></nav></header><main><section class="hero"><p class="eyebrow">熱季玩法</p><h1>高雄夏天怎麼玩？</h1><p class="subtitle">4～10月白天偏熱，中午不要硬排戶外。</p></section><section class="card"><h2>熱季原則</h2><p>4～10月為高雄熱季。戶外景點不要排中午，旗津、西子灣、駁二、大港橋、蓮池潭盡量排早上或傍晚。</p></section><section class="card"><h2>中午安排</h2><p>中午改排室內、百貨、商圈、咖啡、展館，例如夢時代、三多商圈、漢神巨蛋、科工館、駁二室內展館。</p></section><section class="card"><h2>提醒</h2><p>準備防曬、水、帽子，並留意午後雷陣雨。雨天不要硬去海邊、渡輪與長時間戶外。</p></section><p><a class="cta" href="index.html">回首頁</a></p></main></body></html>
