<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>高雄雨天備案｜下雨不開車怎麼玩、室內景點與替代行程</title><meta name="description" content="高雄下雨不開車怎麼玩？整理雨天高適合、中適合與不建議行程，包含夢時代、三多商圈、漢神巨蛋、科工館、駁二室內展館等替代安排。"><meta name="robots" content="index,follow"><link rel="canonical" href="https://wkc50283-star.github.io/kaohsiung-easy-trip/rainy-day.html"><link rel="stylesheet" href="css/style.css"></head><body><header class="site-header"><a class="brand" href="index.html">一路玩高雄</a><nav class="top-nav"><a href="index.html">首頁</a><a href="stay.html">住宿區</a><a href="hot-season.html">熱季玩法</a></nav></header><main><section class="hero"><p class="eyebrow">雨天備案</p><h1>高雄雨天備案怎麼排？</h1><p class="subtitle">下雨時不要硬跑海邊與長時間戶外，改成室內與商圈。</p></section><section class="card"><h2>雨天高適合</h2><p>夢時代、三多商圈、漢神巨蛋、大立／漢神百貨、科工館、高雄市立圖書館總館。</p></section><section class="card"><h2>雨天中適合</h2><p>駁二室內展館、美麗島站周邊、鹽埕咖啡／冰品、衛武營藝術中心。</p></section><section class="card"><h2>雨天低適合</h2><p>旗津、西子灣、蓮池潭、大港橋、愛河戶外散步、衛武營都會公園。</p></section><section class="card"><h2>雨天安排原則</h2><p>先看雨勢，再把海邊、渡輪、戶外公園改成百貨、展館、商圈與捷運站周邊。行程不要排太滿，保留換點時間。</p></section><p><a class="cta" href="index.html">回首頁</a></p></main></body></html>
