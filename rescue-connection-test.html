<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>備援模式旅遊圈銜接測試｜一路玩高雄</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eaf6fa;
      --card: #ffffff;
      --text: #143d73;
      --muted: #62758d;
      --line: #d6e5ec;
      --accent: #188f8a;
      --warning: #b45309;
      --danger: #b91c1c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #f7fbfc 0%, var(--bg) 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      line-height: 1.6;
    }

    main {
      width: min(960px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 48px;
    }

    header,
    section {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(20, 61, 115, 0.08);
      padding: 20px;
    }

    header {
      margin-bottom: 16px;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: 15px;
      font-weight: 800;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 8vw, 42px);
      line-height: 1.15;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 22px;
    }

    p {
      margin: 0;
    }

    .muted {
      color: var(--muted);
      font-size: 16px;
    }

    .tester {
      display: grid;
      gap: 14px;
      margin-bottom: 16px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      font-size: 16px;
      font-weight: 800;
    }

    select {
      width: 100%;
      min-height: 48px;
      border: 1px solid #b7d9df;
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      font: inherit;
      font-size: 17px;
      padding: 0 14px;
    }

    .result {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .result-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #f8fcfd;
      padding: 16px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      min-height: 32px;
      border-radius: 999px;
      padding: 4px 12px;
      background: #dff6f3;
      color: #0f766e;
      font-weight: 900;
    }

    .status.detour {
      background: #fff7ed;
      color: var(--warning);
    }

    .status.not-recommended {
      background: #fee2e2;
      color: var(--danger);
    }

    .grid {
      display: grid;
      gap: 10px;
    }

    .row {
      display: grid;
      gap: 3px;
      border-top: 1px solid var(--line);
      padding-top: 10px;
    }

    .row:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .row strong {
      color: var(--text);
    }

    .review {
      border-color: #f59e0b;
      background: #fffbeb;
    }

    .review strong {
      color: #92400e;
    }

    .error {
      border-color: #fecaca;
      background: #fff1f2;
      color: var(--danger);
    }

    @media (min-width: 720px) {
      .tester {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <p class="eyebrow">內部測試頁</p>
      <h1>備援模式旅遊圈銜接測試</h1>
      <p class="muted">只用來驗證 5 個 JSON 是否可被前台讀取與查詢。找不到資料時不猜路線，不顯示班距、末班、即時到站，也不承諾一定有車或一定趕得上。</p>
    </header>

    <section aria-labelledby="tester-title">
      <h2 id="tester-title">選擇旅遊圈</h2>
      <div class="tester">
        <div class="field">
          <label for="currentZone">currentZone</label>
          <select id="currentZone" disabled>
            <option value="">載入中</option>
          </select>
        </div>
        <div class="field">
          <label for="targetZone">targetZone</label>
          <select id="targetZone" disabled>
            <option value="">載入中</option>
          </select>
        </div>
      </div>
      <div id="result" class="result" aria-live="polite">
        <div class="result-card">
          <p class="muted">請選擇 currentZone 與 targetZone。</p>
        </div>
      </div>
    </section>
  </main>

  <script>
    const dataFiles = {
      zones: "data/rescue-zones.json",
      places: "data/rescue-places.json",
      hubs: "data/rescue-hubs.json",
      connections: "data/zone-connections.json",
      rules: "data/rescue-rules.json"
    };

    const state = {
      zones: [],
      hubs: [],
      connections: [],
      zoneById: new Map(),
      hubById: new Map()
    };

    const currentZoneSelect = document.getElementById("currentZone");
    const targetZoneSelect = document.getElementById("targetZone");
    const result = document.getElementById("result");

    async function loadJson() {
      const entries = await Promise.all(
        Object.entries(dataFiles).map(async ([key, url]) => {
          const response = await fetch(url, { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`${url} 載入失敗`);
          }
          return [key, await response.json()];
        })
      );

      return Object.fromEntries(entries);
    }

    function fillZoneSelect(select, zones) {
      select.innerHTML = '<option value="">請選擇旅遊圈</option>';
      zones.forEach((zone) => {
        const option = document.createElement("option");
        option.value = zone.zoneId;
        option.textContent = zone.zoneName;
        select.appendChild(option);
      });
      select.disabled = false;
    }

    function getZoneName(zoneId) {
      return state.zoneById.get(zoneId)?.zoneName || zoneId;
    }

    function getHubName(hubId) {
      return state.hubById.get(hubId)?.hubName || hubId;
    }

    function renderList(items) {
      if (!items || items.length === 0) {
        return "無";
      }
      return items.join("、");
    }

    function renderConnection(connection) {
      const levelClass = {
        "nearby-safe": "",
        "possible-detour": "detour",
        "not-recommended": "not-recommended"
      }[connection.recommendedLevel] || "";

      const needsReview = connection.needsReview?.hasNeedsReview === true;
      const reviewItems = connection.needsReview?.items || [];

      result.innerHTML = `
        <div class="result-card">
          <div class="grid">
            <span class="status ${levelClass}">${connection.recommendedLevel}</span>
            <div class="row">
              <strong>connectionType</strong>
              <span>${connection.connectionType}</span>
            </div>
            <div class="row">
              <strong>mainTransferHubs</strong>
              <span>${renderList((connection.mainTransferHubs || []).map(getHubName))}</span>
            </div>
            <div class="row">
              <strong>warning</strong>
              <span>${connection.warning || "無"}</span>
            </div>
            <div class="row">
              <strong>fallbackZoneIds</strong>
              <span>${renderList((connection.fallbackZoneIds || []).map(getZoneName))}</span>
            </div>
            <div class="row">
              <strong>sourceDocs</strong>
              <span>${renderList(connection.sourceDocs || [])}</span>
            </div>
          </div>
        </div>
        <div class="result-card ${needsReview ? "review" : ""}">
          <strong>needsReview 狀態</strong>
          <p>${needsReview ? "需查官方資訊" : "目前無 Needs review 標記"}</p>
          ${needsReview ? `<p>${renderList(reviewItems)}</p>` : ""}
        </div>
      `;
    }

    function renderNoConnection() {
      result.innerHTML = `
        <div class="result-card">
          <p>目前沒有這組旅遊圈銜接資料。</p>
          <p class="muted">系統不會自動猜路線，也不會承諾一定有車或一定趕得上。</p>
        </div>
      `;
    }

    function updateResult() {
      const currentZone = currentZoneSelect.value;
      const targetZone = targetZoneSelect.value;

      if (!currentZone || !targetZone) {
        result.innerHTML = `
          <div class="result-card">
            <p class="muted">請選擇 currentZone 與 targetZone。</p>
          </div>
        `;
        return;
      }

      const connection = state.connections.find((item) => (
        item.fromZoneId === currentZone && item.toZoneId === targetZone
      ));

      if (!connection) {
        renderNoConnection();
        return;
      }

      renderConnection(connection);
    }

    async function init() {
      try {
        const data = await loadJson();
        state.zones = data.zones;
        state.hubs = data.hubs;
        state.connections = data.connections;
        state.zoneById = new Map(state.zones.map((zone) => [zone.zoneId, zone]));
        state.hubById = new Map(state.hubs.map((hub) => [hub.hubId, hub]));

        fillZoneSelect(currentZoneSelect, state.zones);
        fillZoneSelect(targetZoneSelect, state.zones);

        currentZoneSelect.addEventListener("change", updateResult);
        targetZoneSelect.addEventListener("change", updateResult);
        updateResult();
      } catch (error) {
        result.innerHTML = `
          <div class="result-card error">
            <strong>JSON 載入失敗</strong>
            <p>${error.message}</p>
          </div>
        `;
      }
    }

    init();
  </script>
</body>
</html>
