<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>旗津不開車怎麼去｜西子灣、鼓山渡輪、旗津老街一日玩法</title><meta name="description" content="旗津不開車怎麼玩？整理捷運西子灣、鼓山渡輪、旗津老街、海岸散步的順路行程，並提醒熱季中午、雨天與風大時的替代安排。"><meta name="robots" content="index,follow"><link rel="canonical" href="https://wkc50283-star.github.io/kaohsiung-easy-trip/spots/cijin.html"><link rel="stylesheet" href="../css/style.css"></head><body><header class="site-header"><a class="brand" href="../index.html">一路玩高雄</a><a href="../index.html">回首頁</a></header><main><section class="hero"><h1>旗津不開車怎麼去？</h1><p class="subtitle">捷運到西子灣，再到鼓山渡輪站搭船。</p></section><section class="card"><h2>半日玩法</h2><p>西子灣 → 鼓山渡輪 → 旗津老街 → 海岸散步。</p><h2>一日玩法</h2><p>西子灣上午走，旗津中午吃小吃，下午看天氣決定是否久留。</p><p>順路景點：西子灣、鼓山渡輪、旗津老街、旗津海岸。</p><p>順路吃喝類型：旗津小吃、海味、烤小卷、冰品。</p><p>交通方式：捷運、步行、渡輪。</p><p>熱季提醒：4～10月中午不要硬曬海邊。</p><p>雨天備案：夢時代、漢神巨蛋、科工館。</p></section><p><a class="cta" href="../index.html">回首頁</a></p></main></body></html>
