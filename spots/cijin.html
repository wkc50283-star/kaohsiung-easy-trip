<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>旗津不開車怎麼去｜西子灣、鼓山渡輪、旗津老街一日玩法</title><meta name="description" content="旗津不開車怎麼玩？整理捷運西子灣、鼓山渡輪、旗津老街、海岸散步的順路行程，並提醒熱季中午、雨天與風大時的替代安排。"><meta name="robots" content="index,follow"><link rel="canonical" href="https://wkc50283-star.github.io/kaohsiung-easy-trip/spots/cijin.html"><meta property="og:title" content="旗津不開車怎麼去｜一路玩高雄"><meta property="og:description" content="用捷運、步行與渡輪安排旗津半日或一日玩法。"><meta property="og:type" content="article"><meta property="og:url" content="https://wkc50283-star.github.io/kaohsiung-easy-trip/spots/cijin.html"><meta property="og:site_name" content="一路玩高雄"><link rel="stylesheet" href="../css/style.css"></head><body><header class="site-header"><a class="brand" href="../index.html">一路玩高雄</a><a class="home-link" href="../index.html">回首頁</a></header><main class="page-shell"><section class="page-hero"><h1>旗津不開車怎麼去？</h1><p class="page-lead">搭捷運到西子灣，再走到鼓山渡輪，適合早上或傍晚出發。</p></section><div class="spot-grid"><article class="info-card"><h2>半日玩法</h2><p>鼓山渡輪、旗津老街、海岸散步，視體力回程。</p></article><article class="info-card"><h2>一日玩法</h2><p>上午旗津，下午西子灣與鼓山，晚上回鹽埕或巨蛋商圈。</p></article><article class="info-card"><h2>順路景點</h2><p>西子灣、鼓山渡輪、旗津老街、海岸步道。</p></article><article class="info-card"><h2>順路吃喝類型</h2><p>海邊小吃、冰品、咖啡。</p></article><article class="info-card"><h2>交通方式</h2><p>捷運西子灣站、步行、鼓山旗津渡輪。</p></article><article class="info-card"><h2>熱季提醒</h2><p>4～10 月中午避免長時間戶外，海邊早上或傍晚較舒服。</p></article><article class="info-card"><h2>雨天備案</h2><p>雨天或風大不建議硬去，改夢時代、三多商圈、科工館。</p></article></div><nav class="mini-links" aria-label="景點頁相關連結"><a href="../index.html">回首頁</a><a href="../weather.html">看天氣預報</a><a href="../rainy-day.html">雨天備案</a><a href="../stay.html">回住宿區建議</a><a href="../trips/kaohsiung-3-days.html">看 3 日遊行程</a></nav></main></body></html>
