<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>蓮池潭附近怎麼玩｜左營舊城、高雄巨蛋與高鐵回程安排</title><meta name="description" content="蓮池潭附近怎麼玩？整理蓮池潭、左營舊城、高雄巨蛋與高鐵左營回程行程，適合最後一天、不開車自由行與舒服季戶外慢遊。"><meta name="robots" content="index,follow"><link rel="canonical" href="https://wkc50283-star.github.io/kaohsiung-easy-trip/spots/lotus-pond.html"><meta property="og:title" content="蓮池潭附近怎麼玩｜一路玩高雄"><meta property="og:description" content="蓮池潭、左營舊城、高雄巨蛋與高鐵回程安排。"><meta property="og:type" content="article"><meta property="og:url" content="https://wkc50283-star.github.io/kaohsiung-easy-trip/spots/lotus-pond.html"><meta property="og:site_name" content="一路玩高雄"><link rel="stylesheet" href="../css/style.css"></head><body><header class="site-header"><a class="brand" href="../index.html">一路玩高雄</a><a class="home-link" href="../index.html">回首頁</a></header><main class="page-shell"><section class="page-hero"><h1>蓮池潭附近怎麼玩？</h1><p class="page-lead">蓮池潭適合舒服季慢走，也適合最後一天接左營高鐵回程。</p></section><div class="spot-grid"><article class="info-card"><h2>半日玩法</h2><p>蓮池潭、左營舊城，下午往左營高鐵。</p></article><article class="info-card"><h2>一日玩法</h2><p>上午蓮池潭，下午巨蛋商圈，晚上回程或瑞豐夜市。</p></article><article class="info-card"><h2>順路景點</h2><p>左營舊城、高雄巨蛋、漢神巨蛋、瑞豐夜市。</p></article><article class="info-card"><h2>順路吃喝類型</h2><p>百貨美食、夜市小吃、咖啡。</p></article><article class="info-card"><h2>交通方式</h2><p>捷運到左營或生態園區，再用步行或公車短程銜接。</p></article><article class="info-card"><h2>熱季提醒</h2><p>4～10 月中午避免長時間戶外，湖邊早上或傍晚較舒服。</p></article><article class="info-card"><h2>雨天備案</h2><p>雨天不適合長時間湖邊散步，可改漢神巨蛋、三多商圈。</p></article></div><nav class="mini-links" aria-label="景點頁相關連結"><a href="../index.html">回首頁</a><a href="../weather.html">看天氣預報</a><a href="../rainy-day.html">雨天備案</a><a href="../stay.html">回住宿區建議</a><a href="../trips/kaohsiung-3-days.html">看 3 日遊行程</a></nav></main></body></html>
