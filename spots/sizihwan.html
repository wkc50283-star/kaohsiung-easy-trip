<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>西子灣附近怎麼玩｜不開車到鼓山渡輪、旗津與海景散步</title><meta name="description" content="西子灣附近怎麼玩？整理適合不開車旅客的西子灣、鼓山渡輪、旗津與海景路線，包含捷運交通、順路吃喝、熱季與雨天提醒。"><meta name="robots" content="index,follow"><link rel="canonical" href="https://wkc50283-star.github.io/kaohsiung-easy-trip/spots/sizihwan.html"><meta property="og:title" content="西子灣附近怎麼玩｜一路玩高雄"><meta property="og:description" content="西子灣、鼓山渡輪與旗津順路安排。"><meta property="og:type" content="article"><meta property="og:url" content="https://wkc50283-star.github.io/kaohsiung-easy-trip/spots/sizihwan.html"><meta property="og:site_name" content="一路玩高雄"><link rel="stylesheet" href="../css/style.css"></head><body><header class="site-header"><a class="brand" href="../index.html">一路玩高雄</a><a class="home-link" href="../index.html">回首頁</a></header><main class="page-shell"><section class="page-hero"><h1>西子灣附近怎麼玩？</h1><p class="page-lead">西子灣適合接鼓山渡輪與旗津，熱季不要把中午留給海邊。</p></section><div class="spot-grid"><article class="info-card"><h2>半日玩法</h2><p>西子灣、鼓山海景、渡輪碼頭周邊。</p></article><article class="info-card"><h2>一日玩法</h2><p>上午旗津，下午西子灣，晚上回鹽埕或市區。</p></article><article class="info-card"><h2>順路景點</h2><p>鼓山渡輪、旗津、駁二、鹽埕。</p></article><article class="info-card"><h2>順路吃喝類型</h2><p>海邊小吃、冰品、咖啡、鹽埕小吃。</p></article><article class="info-card"><h2>交通方式</h2><p>捷運西子灣站、步行、渡輪。</p></article><article class="info-card"><h2>熱季提醒</h2><p>4～10 月中午避免長時間戶外，夕陽時段較適合。</p></article><article class="info-card"><h2>雨天備案</h2><p>美麗島站周邊、駁二室內展館、漢神巨蛋。</p></article></div><nav class="mini-links" aria-label="景點頁相關連結"><a href="../index.html">回首頁</a><a href="../weather.html">看天氣預報</a><a href="../rainy-day.html">雨天備案</a><a href="../stay.html">回住宿區建議</a><a href="../trips/kaohsiung-3-days.html">看 3 日遊行程</a></nav></main></body></html>
