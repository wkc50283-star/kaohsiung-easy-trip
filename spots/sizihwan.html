<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>西子灣附近怎麼玩｜不開車到鼓山渡輪、旗津與海景散步</title><meta name="description" content="西子灣附近怎麼玩？整理適合不開車旅客的西子灣、鼓山渡輪、旗津與海景路線，包含捷運交通、順路吃喝、熱季與雨天提醒。"><meta name="robots" content="index,follow"><link rel="canonical" href="https://wkc50283-star.github.io/kaohsiung-easy-trip/spots/sizihwan.html"><link rel="stylesheet" href="../css/style.css"></head><body><header class="site-header"><a class="brand" href="../index.html">一路玩高雄</a><a href="../index.html">回首頁</a></header><main><section class="hero"><h1>西子灣附近怎麼玩？</h1><p class="subtitle">西子灣最適合和鼓山渡輪、旗津一起排。</p></section><section class="card"><h2>半日玩法</h2><p>捷運西子灣 → 鼓山渡輪站 → 港邊散步。</p><h2>一日玩法</h2><p>西子灣 → 鼓山渡輪 → 旗津 → 回市區吃晚餐。</p><p>順路景點：西子灣、鼓山渡輪、旗津、鹽埕。</p><p>順路吃喝類型：冰品、咖啡、旗津小吃、鹽埕小吃。</p><p>交通方式：捷運、渡輪、步行。</p><p>熱季提醒：4～10月中午避免長時間戶外。</p><p>雨天備案：夢時代、駁二室內展館、三多商圈。</p></section><p><a class="cta" href="../index.html">回首頁</a></p></main></body></html>
